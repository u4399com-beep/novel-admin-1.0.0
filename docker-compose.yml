# ============================================================
# Novel Management System - Docker Compose (Production)
# ============================================================
# Quick Start:
#   chmod +x install.sh && ./install.sh
# Or manually:
#   cp .env.production .env  (then edit .env)
#   docker compose up -d --build
# ============================================================

services:
  # ============ PostgreSQL Database ============
  postgres:
    image: postgres:17-alpine
    container_name: novel-postgres
    restart: unless-stopped
    ports:
      # Only expose to host if you need external DB access.
      # Comment out for better security.
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-novel_admin}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Chinese locale support
      LANG: zh_CN.UTF-8
      LC_ALL: zh_CN.UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Optional: mount backup directory for pg_dump output
      - ${BACKUP_DIR:-./backups}:/backups:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novel} -d ${POSTGRES_DB:-novel_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ============ Main Application (Next.js + Scraper) ============
  novel-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novel-manager
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-data:/app/data
    environment:
      # ─── Database (PostgreSQL) ───
      - DATABASE_URL=postgresql://${POSTGRES_USER:-novel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-novel_admin}?connection_limit=10&pool_timeout=30
      # Scraper queue uses the same database
      - QUEUE_DB_URL=postgresql://${POSTGRES_USER:-novel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-novel_admin}?connection_limit=5
      - DB_PROVIDER=postgresql

      # ─── App Config ───
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_NAME=${APP_NAME:-小说管理系统}
      - NEXT_PUBLIC_APP_URL=${APP_URL:-http://localhost:3000}

      # ─── Authentication ───
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set in .env}
      - NEXTAUTH_URL=${APP_URL:-http://localhost:3000}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}

      # ─── Service Auth ───
      - SCRAPER_SERVICE_TOKEN=${SCRAPER_SERVICE_TOKEN:?SCRAPER_SERVICE_TOKEN must be set in .env}
      - SCRAPER_SERVICE_URL=http://localhost:3099
      - MAIN_APP_URL=http://localhost:3000

      # ─── Optional: External Services ───
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-}
      - AGENTQL_API_KEY=${AGENTQL_API_KEY:-}
      - AGENTQL_API_URL=${AGENTQL_API_URL:-}
      - CLOUD_BROWSER_PROVIDER=${CLOUD_BROWSER_PROVIDER:-}
      - BROWSERLESS_API_KEY=${BROWSERLESS_API_KEY:-}
      - BROWSERLESS_API_URL=${BROWSERLESS_API_URL:-}
      - STEEL_API_KEY=${STEEL_API_KEY:-}
      - STEEL_API_URL=${STEEL_API_URL:-}

      # ─── Misc ───
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/auth/csrf"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  postgres-data:
    driver: local
  app-data:
    driver: local