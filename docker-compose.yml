# ============================================================
# Novel Management System - Docker Compose (LOW MEMORY)
# Optimized for 1H1G servers
# ============================================================

services:
  # ============ PostgreSQL Database ============
  postgres:
    image: postgres:17-alpine
    container_name: novel-postgres
    restart: unless-stopped
    # Do NOT expose DB port to host (saves ~30MB RAM, more secure)
    # Uncomment if you need external DB access:
    # ports:
    #   - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-novel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-novel_admin}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Low-memory PostgreSQL tuning
      POSTGRES_INITDB_ARGS: "--no-locale --encoding=UTF8"
      POSTGRES_SHARED_BUFFERS: 64MB
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MAINTENANCE_WORK_MEM: 32MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 128MB
      POSTGRES_MAX_CONNECTIONS: 20
      POSTGRES_WAL_LEVEL: minimal
      POSTGRES_MAX_WAL_SIZE: 32MB
      POSTGRES_MIN_WAL_SIZE: 4MB
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${BACKUP_DIR:-./backups}:/backups:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novel} -d ${POSTGRES_DB:-novel_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.5"
        reservations:
          memory: 64M
    # Use tmpfs for PG WAL to reduce disk I/O (faster on low-end servers)
    tmpfs:
      - /var/run/postgresql

  # ============ Main Application (Next.js + Scraper) ============
  novel-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novel-manager
    restart: unless-stopped
    ports:
      - "${APP_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-data:/app/data
    environment:
      # ─── Database (PostgreSQL) ───
      - DATABASE_URL=postgresql://${POSTGRES_USER:-novel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-novel_admin}?connection_limit=5&pool_timeout=30
      - QUEUE_DB_URL=postgresql://${POSTGRES_USER:-novel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-novel_admin}?connection_limit=3
      - DB_PROVIDER=postgresql

      # ─── App Config ───
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_NAME=${APP_NAME:-小说管理系统}
      - NEXT_PUBLIC_APP_URL=${APP_URL:-http://localhost:3000}

      # ─── Authentication ───
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set in .env}
      - NEXTAUTH_URL=${APP_URL:-http://localhost:3000}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}

      # ─── Service Auth ───
      - SCRAPER_SERVICE_TOKEN=${SCRAPER_SERVICE_TOKEN:?SCRAPER_SERVICE_TOKEN must be set in .env}
      - SCRAPER_SERVICE_URL=http://localhost:3099
      - MAIN_APP_URL=http://localhost:3000

      # ─── Optional: External Services ───
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-}
      - AGENTQL_API_KEY=${AGENTQL_API_KEY:-}
      - AGENTQL_API_URL=${AGENTQL_API_URL:-}
      - CLOUD_BROWSER_PROVIDER=${CLOUD_BROWSER_PROVIDER:-}
      - BROWSERLESS_API_KEY=${BROWSERLESS_API_KEY:-}
      - BROWSERLESS_API_URL=${BROWSERLESS_API_URL:-}
      - STEEL_API_KEY=${STEEL_API_KEY:-}
      - STEEL_API_URL=${STEEL_API_URL:-}

      # ─── Misc ───
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/auth/csrf || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 640M
          cpus: "0.8"
        reservations:
          memory: 256M
    # Shared memory for Node.js (reduce crashes on low-mem)
    shm_size: 128m

volumes:
  postgres-data:
    driver: local
  app-data:
    driver: local