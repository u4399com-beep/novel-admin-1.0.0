version: '3.8'

services:
  # ============ Main Application ============
  novel-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novel-manager
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - novel-data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/db/custom.db
      - SCRAPER_SERVICE_URL=http://localhost:3099
      - NEXT_PUBLIC_APP_NAME=${APP_NAME:-小说管理系统}
      - NEXT_PUBLIC_APP_URL=${APP_URL:-http://localhost:3000}
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  novel-data:
    driver: local