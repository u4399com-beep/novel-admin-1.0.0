# ============================================================
# Novel Management System - Docker Compose (ADAPTIVE MEMORY)
#
# Memory limits are set via .env variables, which are auto-configured
# by deploy.sh based on detected server hardware:
#
#   Tier    RAM        PG Limit   App Limit   App SHM
#   ───────────────────────────────────────────────────
#   tiny    <1.5GB     128M       512M        64m
#   small   1.5-3GB    192M       640M        128m
#   normal  3GB+       256M       1024M       256m
#
# IMPORTANT: All variables MUST be set in .env (no defaults here
# because the colon-default syntax breaks older docker-compose versions).
# deploy.sh auto-generates a complete .env on every deploy.
# ============================================================

version: '3.3'

services:
  # ============ PostgreSQL Database ============
  postgres:
    image: postgres:17-alpine
    container_name: novel-postgres
    restart: unless-stopped
    # Do NOT expose DB port to host (saves ~30MB RAM, more secure)
    # Uncomment if you need external DB access:
    # ports:
    #   - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Low-memory PostgreSQL tuning
      POSTGRES_INITDB_ARGS: "--no-locale --encoding=UTF8"
      POSTGRES_SHARED_BUFFERS: ${PG_SHARED_BUFFERS}
      POSTGRES_WORK_MEM: ${PG_WORK_MEM}
      POSTGRES_MAINTENANCE_WORK_MEM: ${PG_MAINTENANCE_WORK_MEM}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${PG_EFFECTIVE_CACHE_SIZE}
      POSTGRES_MAX_CONNECTIONS: ${PG_MAX_CONNECTIONS}
      POSTGRES_WAL_LEVEL: minimal
      POSTGRES_MAX_WAL_SIZE: ${PG_MAX_WAL_SIZE}
      POSTGRES_MIN_WAL_SIZE: ${PG_MIN_WAL_SIZE}
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${BACKUP_DIR}:/backups:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: ${PG_MEMORY_LIMIT}
          cpus: ${PG_CPU_LIMIT}
        reservations:
          memory: ${PG_MEMORY_RESERVATION}
    # Use tmpfs for PG WAL to reduce disk I/O (faster on low-end servers)
    tmpfs:
      - /var/run/postgresql

  # ============ Main Application (Next.js + Scraper) ============
  novel-manager:
    build:
      context: .
      dockerfile: Dockerfile
      # Pass hardware-tuned build args
      args:
        NODE_MAX_OLD_SPACE_SIZE: ${NODE_MAX_OLD_SPACE_SIZE}
        BUN_GC_THRESHOLD: ${BUN_GC_THRESHOLD}
    container_name: novel-manager
    restart: unless-stopped
    ports:
      - "${APP_PORT}:3000"
    depends_on:
      - postgres
    volumes:
      - app-data:/app/data
    environment:
      # ─── Database (PostgreSQL) ───
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?connection_limit=5&pool_timeout=30
      - QUEUE_DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?connection_limit=3
      - DB_PROVIDER=postgresql

      # ─── App Config ───
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_NAME=${APP_NAME}
      - NEXT_PUBLIC_APP_URL=${APP_URL}

      # ─── Authentication ───
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${APP_URL}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

      # ─── Service Auth ───
      - SCRAPER_SERVICE_TOKEN=${SCRAPER_SERVICE_TOKEN}
      - SCRAPER_SERVICE_URL=http://localhost:3099
      - MAIN_APP_URL=http://localhost:3000

      # ─── Optional: External Services ───
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL}
      - AGENTQL_API_KEY=${AGENTQL_API_KEY}
      - AGENTQL_API_URL=${AGENTQL_API_URL}
      - CLOUD_BROWSER_PROVIDER=${CLOUD_BROWSER_PROVIDER}
      - BROWSERLESS_API_KEY=${BROWSERLESS_API_KEY}
      - BROWSERLESS_API_URL=${BROWSERLESS_API_URL}
      - STEEL_API_KEY=${STEEL_API_KEY}
      - STEEL_API_URL=${STEEL_API_URL}

      # ─── Misc ───
      - TZ=${TZ}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/auth/csrf || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: ${APP_MEMORY_LIMIT}
          cpus: ${APP_CPU_LIMIT}
        reservations:
          memory: ${APP_MEMORY_RESERVATION}
    # Shared memory for Node.js (reduce crashes on low-mem)
    shm_size: ${APP_SHM_SIZE}

volumes:
  postgres-data:
    driver: local
  app-data:
    driver: local